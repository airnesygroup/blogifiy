<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoolicon blog app</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
     window.addEventListener('scroll', () => {
  const scrollPosition = window.scrollY; // Current scroll position
  const documentHeight = document.documentElement.scrollHeight; // Total document height
  const windowHeight = window.innerHeight; // Height of the viewport

  // Calculate the distance from the top to the bottom of the document
  const scrollRemaining = documentHeight - windowHeight - scrollPosition;

  // Apply logic for showing or hiding the gradient
  if (scrollPosition > 100 && scrollRemaining > 1000) {
    document.body.classList.add('scroll-gradient');
  } else {
    document.body.classList.remove('scroll-gradient');
  }
});

    </script>
  </body>
</html>
