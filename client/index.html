<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoolicon blog app</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('scroll', () => {
        const scrollPosition = window.scrollY; // Current scroll position
        
        // After scrolling down 1000px, the gradient disappears and is set to absolute
        if (scrollPosition > 1000) {
          document.body.classList.add('scroll-past-1000');
        } else {
          document.body.classList.remove('scroll-past-1000');
        }

        // When scrolling back up and within 100px from the top, show the gradient
        if (scrollPosition < 1000 && !document.body.classList.contains('scroll-past-1000')) {
          document.body.classList.add('show-gradient');
        } else {
          document.body.classList.remove('show-gradient');
        }
      });
    </script>
  </body>
</html>
